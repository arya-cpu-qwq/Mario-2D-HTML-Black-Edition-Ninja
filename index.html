<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Retro Odyssey</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        .screen {
            pointer-events: auto;
            background: rgba(15, 15, 35, 0.9);
            padding: 2rem;
            border-radius: 1rem;
            border: 2px solid #6366f1;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
        }
        .hidden { display: none !important; }
        .hud {
            position: absolute;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <!-- HUD -->
        <div id="hud" class="hud hidden">
            <div id="player-display" class="text-blue-300">Ninja: -</div>
            <div id="score-display" class="text-yellow-400">Koin: 0</div>
            <div id="high-score-display" class="text-purple-400">Terbaik: 0</div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1 class="text-4xl mb-6 font-bold text-indigo-400 tracking-widest">NINJA BAYANGAN</h1>
            <p class="text-gray-400 mb-4 text-sm uppercase tracking-tighter">Malam di Kuil Terlarang</p>
            <input type="text" id="name-input" placeholder="Nama Shinobi Anda" maxlength="12" 
                class="w-full p-3 mb-4 bg-gray-900 border border-indigo-900 rounded text-center outline-none focus:border-indigo-500 text-white placeholder-gray-600">
            <button id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded transition-all transform hover:scale-105 active:scale-95 shadow-lg">
                MULAI PERJALANAN
            </button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1 class="text-4xl mb-4 font-bold text-red-500">MISI GAGAL</h1>
            <p id="final-score" class="text-xl mb-6 text-gray-300">Skor: 0</p>
            <button id="restart-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded transition-colors">
                BANGKIT KEMBALI
            </button>
        </div>
    </div>

    <script>
        // --- Konstanta & Konfigurasi ---
        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.35;
        const SPEED = 0.12;
        const ENEMY_SPEED = 0.04;

        // --- Status Permainan ---
        let state = {
            playerName: '',
            score: 0,
            highScore: localStorage.getItem('retroHighScore') || 0,
            isRunning: false,
            keys: {},
            entities: [],
            enemies: [],
            coins: []
        };

        let scene, camera, renderer, player, playerGroup;
        let worldGroup = new THREE.Group();

        function initThree() {
            scene = new THREE.Scene();
            // Latar belakang biru malam yang lebih cerah (Midnight Blue)
            scene.background = new THREE.Color(0x1a1a2e); 
            // Kabut biru gelap untuk kedalaman visual
            scene.fog = new THREE.Fog(0x1a1a2e, 10, 45);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Pencahayaan Lingkungan yang lebih terang agar detail terlihat
            const ambientLight = new THREE.AmbientLight(0x606080, 0.8);
            scene.add(ambientLight);

            // Cahaya Bulan (Directional)
            const moonLight = new THREE.DirectionalLight(0xaaccff, 1.2);
            moonLight.position.set(10, 20, 10);
            moonLight.castShadow = true;
            // Optimasi area bayangan
            moonLight.shadow.camera.left = -20;
            moonLight.shadow.camera.right = 20;
            moonLight.shadow.camera.top = 20;
            moonLight.shadow.camera.bottom = -20;
            scene.add(moonLight);

            // Tambahkan sedikit cahaya dari bawah untuk mengurangi kegelapan total
            const fillLight = new THREE.HemisphereLight(0x1a1a2e, 0x333344, 0.5);
            scene.add(fillLight);

            scene.add(worldGroup);
        }

        // --- Fungsi Pembuat Objek ---
        function createPlayer() {
            playerGroup = new THREE.Group();
            
            // Material dengan sedikit shininess agar bereaksi terhadap cahaya
            const blackMat = new THREE.MeshPhongMaterial({ color: 0x0a0a0a, shininess: 30 });
            const skinMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
            const metalMat = new THREE.MeshPhongMaterial({ color: 0xcccccc, shininess: 100 });
            const redMat = new THREE.MeshPhongMaterial({ color: 0xbb0000, shininess: 50 });

            // 1. Tubuh
            const torsoGeo = new THREE.BoxGeometry(0.6, 0.8, 0.4);
            const torso = new THREE.Mesh(torsoGeo, blackMat);
            torso.position.y = 0.7;
            torso.castShadow = true;
            playerGroup.add(torso);

            // 2. Kepala
            const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const head = new THREE.Mesh(headGeo, blackMat);
            head.position.y = 1.35;
            head.castShadow = true;
            playerGroup.add(head);

            // Wajah/Mata
            const eyeArea = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.12), skinMat);
            eyeArea.position.set(0, 1.38, 0.26);
            playerGroup.add(eyeArea);

            const pupilGeo = new THREE.BoxGeometry(0.04, 0.04, 0.01);
            const pupilL = new THREE.Mesh(pupilGeo, new THREE.MeshBasicMaterial({ color: 0x000000 }));
            pupilL.position.set(-0.08, 1.38, 0.27);
            playerGroup.add(pupilL);
            const pupilR = pupilL.clone();
            pupilR.position.x = 0.08;
            playerGroup.add(pupilR);

            // 3. Syal
            const scarf = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.15, 0.55), redMat);
            scarf.position.y = 1.05;
            playerGroup.add(scarf);

            // 4. Kaki
            const legGeo = new THREE.BoxGeometry(0.25, 0.5, 0.25);
            const legL = new THREE.Mesh(legGeo, blackMat);
            legL.position.set(-0.15, 0.25, 0);
            legL.castShadow = true;
            playerGroup.add(legL);

            const legR = legL.clone();
            legR.position.x = 0.15;
            playerGroup.add(legR);

            // 5. Lengan
            const armGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
            const armL = new THREE.Mesh(armGeo, blackMat);
            armL.position.set(-0.4, 0.8, 0);
            armL.castShadow = true;
            playerGroup.add(armL);

            const armR = armL.clone();
            armR.position.x = 0.4;
            playerGroup.add(armR);

            // 6. Katana
            const hilt = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.05), redMat);
            hilt.position.set(0.15, 1.1, -0.25);
            hilt.rotation.z = Math.PI / 4;
            playerGroup.add(hilt);

            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.8, 0.01), metalMat);
            blade.position.set(0.3, 0.7, -0.28);
            blade.rotation.z = Math.PI / 4;
            playerGroup.add(blade);

            playerGroup.scale.set(0.8, 0.8, 0.8);
            playerGroup.position.y = 2;
            
            playerGroup.userData = { velY: 0, isGrounded: false, width: 0.6, height: 1.5 };
            scene.add(playerGroup);
            player = playerGroup;
        }

        function createPlatform(x, y, w, h) {
            const geo = new THREE.BoxGeometry(w, h, 2);
            // Menggunakan warna slate gelap yang lebih kaya daripada hitam murni
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x333344, 
                roughness: 0.8,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x + w/2, y - h/2, 0);
            mesh.receiveShadow = true;
            worldGroup.add(mesh);
            state.entities.push({ mesh, x, y, w, h, type: 'platform' });
        }

        function createCoin(x, y) {
            const geo = new THREE.CylinderGeometry(0.3, 0.3, 0.08, 16);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xffcc00, 
                metalness: 0.9, 
                roughness: 0.1,
                emissive: 0x442200 // Sedikit cahaya pada koin
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = Math.PI / 2;
            mesh.position.set(x, y, 0);
            mesh.castShadow = true;
            worldGroup.add(mesh);
            state.coins.push({ mesh, x, y, collected: false });
        }

        function createEnemy(x, y) {
            const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xff3333, 
                emissive: 0x440000 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, 0);
            mesh.castShadow = true;
            worldGroup.add(mesh);
            state.enemies.push({ mesh, x, y, dir: 1, spawnX: x, range: 4 });
        }

        function buildLevel() {
            worldGroup.clear();
            state.entities = [];
            state.enemies = [];
            state.coins = [];

            // Lantai Utama
            createPlatform(-10, 0, 50, 4);
            createPlatform(45, 0, 25, 4);
            createPlatform(75, 0, 50, 4);

            // Elemen Tangga
            createPlatform(5, 3, 3, 0.6);
            createPlatform(10, 5, 3, 0.6);
            createPlatform(15, 3, 3, 0.6);

            for(let i=0; i<15; i++) {
                createCoin(12 + (i*6), 2);
                if(i % 3 === 0 && i > 0) createEnemy(25 + (i*7), 0.5);
            }
        }

        function handleInput() {
            if (!state.isRunning) return;

            if (state.keys['ArrowLeft'] || state.keys['KeyA']) {
                player.position.x -= SPEED;
                player.rotation.y = -Math.PI / 2;
            }
            if (state.keys['ArrowRight'] || state.keys['KeyD']) {
                player.position.x += SPEED;
                player.rotation.y = Math.PI / 2;
            }

            if ((state.keys['ArrowUp'] || state.keys['Space'] || state.keys['KeyW']) && player.userData.isGrounded) {
                player.userData.velY = JUMP_FORCE;
                player.userData.isGrounded = false;
                
                anime({
                    targets: player.scale,
                    y: [0.7, 1.0, 0.8],
                    duration: 300,
                    easing: 'easeOutQuad'
                });
            }
        }

        function updatePhysics() {
            if (!state.isRunning) return;

            player.userData.velY += GRAVITY;
            player.position.y += player.userData.velY;

            player.userData.isGrounded = false;
            const pX = player.position.x;
            const pY = player.position.y;

            for (const ent of state.entities) {
                if (pX + 0.25 > ent.x && pX - 0.25 < ent.x + ent.w) {
                    if (player.userData.velY < 0 && pY <= ent.y && pY >= ent.y - 0.8) {
                        player.position.y = ent.y;
                        player.userData.velY = 0;
                        player.userData.isGrounded = true;
                    }
                }
            }

            state.coins.forEach(coin => {
                if (!coin.collected && player.position.distanceTo(coin.mesh.position) < 1) {
                    coin.collected = true;
                    state.score += 10;
                    document.getElementById('score-display').innerText = `Koin: ${state.score}`;
                    anime({
                        targets: coin.mesh.position,
                        y: coin.mesh.position.y + 2,
                        opacity: 0,
                        duration: 500,
                        easing: 'easeOutExpo',
                        complete: () => coin.mesh.visible = false
                    });
                }
                coin.mesh.rotation.y += 0.05;
            });

            state.enemies.forEach(enemy => {
                enemy.x += enemy.dir * ENEMY_SPEED;
                if (Math.abs(enemy.x - enemy.spawnX) > enemy.range) enemy.dir *= -1;
                enemy.mesh.position.x = enemy.x;
                if (player.position.distanceTo(enemy.mesh.position) < 0.9) gameOver();
            });

            if (player.position.y < -8) gameOver();
            camera.position.x += (player.position.x - camera.position.x) * 0.05;
        }

        function gameOver() {
            state.isRunning = false;
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('retroHighScore', state.highScore);
            }
            document.getElementById('final-score').innerText = `Skor: ${state.score}`;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function startGame() {
            const name = document.getElementById('name-input').value || 'Shinobi';
            state.playerName = name;
            state.score = 0;
            state.isRunning = true;
            document.getElementById('player-display').innerText = `Ninja: ${name}`;
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            player.position.set(0, 2, 0);
            player.userData.velY = 0;
            buildLevel();
        }

        window.addEventListener('keydown', e => state.keys[e.code] = true);
        window.addEventListener('keyup', e => state.keys[e.code] = false);
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-screen').classList.add('hidden');
            startGame();
        });

        function animate() {
            requestAnimationFrame(animate);
            handleInput();
            updatePhysics();
            
            if(player && state.isRunning) {
                const time = Date.now() * 0.003;
                player.children[0].scale.y = 1 + Math.sin(time) * 0.03;
            }
            
            renderer.render(scene, camera);
        }

        window.onload = () => {
            initThree();
            createPlayer();
            buildLevel();
            animate();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
